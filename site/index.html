<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>連想絵文字検索</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>連想絵文字検索</h1>
          <p>言葉、場面、形から絵文字を探す</p>
        </div>
        <button id="copyButton" class="copy-button" type="button" disabled>コピー</button>
      </header>

      <section class="search-panel" aria-label="検索">
        <div class="search-row">
          <label class="search-label" for="searchInput">検索語</label>
          <div class="search-mode" role="group" aria-label="検索方法">
            <button id="fuzzyModeButton" class="mode-button is-active" type="button">あいまい検索</button>
            <button id="exactModeButton" class="mode-button" type="button">一致検索</button>
          </div>
        </div>
        <input id="searchInput" type="search" autocomplete="off" placeholder="ありがとう 夏 動物 ふわふわ 三色旗">
        <div id="quickTags" class="quick-tags" aria-label="候補タグ"></div>
        <div id="selectedInline" class="selected-inline selected-empty">絵文字を選ぶと、ここに関連語を表示します。</div>
      </section>

      <section class="result-pane" aria-label="検索結果">
        <div class="pane-heading">
          <div class="pane-title-line">
            <h2>ヒット</h2>
            <span id="resultCount" class="result-count">0個</span>
          </div>
          <div id="hitTags" class="hit-tags" aria-label="ヒットしたタグ"></div>
          <div class="pane-actions">
            <button id="randomResultsButton" class="random-button" type="button">ランダム</button>
          </div>
        </div>
        <div id="results" class="emoji-grid"></div>
      </section>
    </main>

    <script src="./data/emoji-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
